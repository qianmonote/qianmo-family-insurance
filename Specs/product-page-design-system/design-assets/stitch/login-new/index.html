<!DOCTYPE html>

<html lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'IBM Plex Sans', sans-serif;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
        .mesh-bg {
            background-color: #f8f9ff;
            background-image: 
                radial-gradient(at 0% 0%, hsla(220,100%,95%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(220,100%,98%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(160,100%,95%,1) 0, transparent 50%);
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-fixed-variant": "#5a00c6",
                        "on-primary-container": "#dfe3ff",
                        "surface-bright": "#f8f9ff",
                        "primary-fixed-dim": "#b7c4ff",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#eff4ff",
                        "primary": "#003ec7",
                        "error-container": "#ffdad6",
                        "tertiary-fixed": "#eaddff",
                        "tertiary": "#620bd3",
                        "surface": "#f8f9ff",
                        "on-surface-variant": "#434656",
                        "tertiary-fixed-dim": "#d2bbff",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "on-error-container": "#93000a",
                        "primary-fixed": "#dde1ff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#213145",
                        "surface-dim": "#cbdbf5",
                        "on-secondary-fixed-variant": "#005232",
                        "secondary-container": "#25fea8",
                        "secondary-fixed": "#50ffaf",
                        "on-secondary-container": "#007147",
                        "tertiary-container": "#7b39ec",
                        "surface-container-high": "#dce9ff",
                        "on-secondary-fixed": "#002111",
                        "on-primary-fixed": "#001452",
                        "on-background": "#0b1c30",
                        "secondary": "#006c44",
                        "on-primary-fixed-variant": "#0038b6",
                        "on-surface": "#0b1c30",
                        "secondary-fixed-dim": "#00e293",
                        "surface-tint": "#004ced",
                        "on-tertiary-fixed": "#25005a",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9ff",
                        "primary-container": "#0052ff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#b7c4ff",
                        "surface-container": "#e5eeff",
                        "on-tertiary-container": "#ecdfff",
                        "outline": "#737688",
                        "on-primary": "#ffffff",
                        "surface-container-highest": "#d3e4fe",
                        "outline-variant": "#c3c5d9",
                        "inverse-on-surface": "#eaf1ff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "md": "24px",
                        "gutter": "24px",
                        "sm": "12px",
                        "container-margin": "32px",
                        "xl": "64px",
                        "base": "8px",
                        "lg": "40px",
                        "xs": "4px"
                    },
                    "fontFamily": {
                        "display-lg": ["IBM Plex Sans"],
                        "body-md": ["IBM Plex Sans"],
                        "label-sm": ["IBM Plex Sans"],
                        "label-md": ["IBM Plex Sans"],
                        "headline-lg": ["IBM Plex Sans"],
                        "headline-lg-mobile": ["IBM Plex Sans"],
                        "headline-md": ["IBM Plex Sans"],
                        "body-lg": ["IBM Plex Sans"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "1.1", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "body-md": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                        "label-sm": ["12px", {"lineHeight": "1", "fontWeight": "500"}],
                        "label-md": ["14px", {"lineHeight": "1", "letterSpacing": "0.02em", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "1.2", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "headline-lg-mobile": ["28px", {"lineHeight": "1.2", "fontWeight": "600"}],
                        "headline-md": ["24px", {"lineHeight": "1.3", "fontWeight": "500"}],
                        "body-lg": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}]
                    }
                },
            },
        }
    </script>
</head>
<body class="mesh-bg flex min-h-screen flex-col items-center justify-center p-md">
<!-- Top Branding Anchor -->
<div class="fixed top-base left-container-margin hidden md:block pt-gutter">
<div class="text-primary font-headline-md text-headline-md font-bold tracking-tight">阡陌家庭保</div>
</div>
<main class="w-full max-w-md relative z-10">
<!-- Login Card -->
<div class="glass-effect border border-outline-variant shadow-2xl rounded-xl p-lg flex flex-col gap-md relative overflow-hidden">
<!-- Decorative Gradient Accent -->
<div class="absolute top-0 left-0 w-full h-1.5 bg-gradient-to-r from-primary via-secondary to-tertiary"></div>
<header class="flex flex-col items-center gap-sm mb-base text-center">
<div class="w-14 h-14 bg-primary-container rounded-xl flex items-center justify-center text-on-primary shadow-lg mb-xs">
<span class="material-symbols-outlined text-[32px]" style="font-variation-settings: 'FILL' 1;">guardian</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-background">登录账户</h1>
<p class="font-body-md text-body-md text-on-surface-variant">您的智能家庭保险管家</p>
</header>
<form class="flex flex-col gap-md" onsubmit="event.preventDefault();">
<!-- Email Field -->
<div class="flex flex-col gap-base">
<label class="font-label-md text-label-md text-on-surface" for="email">注册邮箱</label>
<div class="relative group">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="email" name="email" placeholder="hello@family.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-base">
<div class="flex justify-between items-center">
<label class="font-label-md text-label-md text-on-surface" for="password">安全密码</label>
<a class="font-label-sm text-label-sm text-primary hover:text-primary-container transition-colors font-semibold" href="#">忘记密码？</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-3 flex items-center pointer-events-none text-outline group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-lowest border border-outline-variant rounded-lg font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="password" name="password" placeholder="请输入您的密码" type="password"/>
<button class="absolute inset-y-0 right-3 flex items-center text-outline hover:text-primary transition-colors" onclick="togglePassword()" type="button">
<span class="material-symbols-outlined text-[20px]" id="password-toggle-icon">visibility</span>
</button>
</div>
</div>
<!-- Remember Me & Security Status -->
<div class="flex items-center justify-between py-xs">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary focus:ring-offset-0 transition-all cursor-pointer" type="checkbox"/>
<span class="font-label-sm text-label-sm text-on-surface-variant group-hover:text-on-surface transition-colors">记住登录</span>
</label>
<div class="flex items-center gap-1 text-secondary">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">verified_user</span>
<span class="font-label-sm text-label-sm font-semibold uppercase tracking-wider">Secure Access</span>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-sm mt-base">
<button class="w-full bg-primary hover:bg-primary-container text-on-primary py-4 px-4 rounded-lg font-label-md text-label-md transition-all active:scale-[0.98] shadow-md hover:shadow-lg flex items-center justify-center gap-2" type="submit">
<span>立即登录</span>
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
<div class="flex items-center gap-2 py-base">
<div class="h-[1px] flex-grow bg-outline-variant"></div>
<span class="font-label-sm text-label-sm text-outline px-2">或者</span>
<div class="h-[1px] flex-grow bg-outline-variant"></div>
</div>
<a class="w-full border-2 border-primary text-primary hover:bg-primary-fixed/30 py-3 rounded-lg font-label-md text-label-md text-center transition-all font-semibold" href="/register">
                        新用户？立即加入
                    </a>
</div>
</form>
</div>
<!-- Trust Footer -->
<footer class="mt-lg text-center flex flex-col gap-sm">
<div class="flex justify-center items-center gap-6 text-outline opacity-60">
<span class="material-symbols-outlined text-[24px] hover:text-primary transition-colors cursor-help">security</span>
<span class="material-symbols-outlined text-[24px] hover:text-primary transition-colors cursor-help">verified</span>
<span class="material-symbols-outlined text-[24px] hover:text-primary transition-colors cursor-help">lock_person</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant max-w-[280px] mx-auto leading-relaxed">
                © 2024 阡陌家庭保. 我们使用高强度加密技术保护您的个人资产与隐私。
            </p>
<div class="flex justify-center gap-gutter mt-base">
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors font-medium underline underline-offset-4" href="#">隐私政策</a>
<a class="font-label-sm text-label-sm text-outline hover:text-primary transition-colors font-medium underline underline-offset-4" href="#">服务条款</a>
</div>
</footer>
</main>
<!-- Side Image Decor - Only visible on Large screens -->
<div class="fixed right-0 top-0 bottom-0 w-[40%] hidden xl:block overflow-hidden">
<img class="h-full w-full object-cover" data-alt="Modern corporate professionalism" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDvJxRb6vsqr1y-XD18MFluuFWSWIddb6ZcQ_1SgUKZF-GyG0EnhK9r9u3yje6lJ0W8mJt3uRryWpSHSKxcKi_SCvrj7jXPV1qU2AuKmzAPX53RLKtnkJk7a6h22nr3VGPhyQ4xwEafay6xwMFG_25X5_0NI3X_Myutka25s6uLKgur29EUNYCbupJMJXfr8eY5kQoFUF8f-xYDDlGsFjd48jLPmMHhUF_EcGhspR4w7_NfDNZ_eXA-"/>
<div class="absolute inset-0 bg-gradient-to-r from-background via-transparent to-transparent"></div>
</div>
<script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const icon = document.getElementById('password-toggle-icon');
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                icon.innerText = 'visibility_off';
            } else {
                passwordInput.type = 'password';
                icon.innerText = 'visibility';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            const card = document.querySelector('.glass-effect');
            card.style.opacity = '0';
            card.style.transform = 'translateY(12px)';
            
            setTimeout(() => {
                card.style.transition = 'all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1)';
                card.style.opacity = '1';
                card.style.transform = 'translateY(0)';
            }, 100);
        });
    </script>
</body></html>
